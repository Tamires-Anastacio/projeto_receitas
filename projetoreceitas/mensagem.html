<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Sucesso</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #e644dd 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .card {
            background: rgb(236, 165, 221);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }

        .card.show {
            opacity: 1;
            transform: translateY(0);
        }

        h1 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .icon {
            font-size: 4rem;
            color: #470547;
            display: block;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .btn {
            margin-top: 1.5rem;
            padding: 10px 25px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #5a368a;
        }
    </style>
</head>
<body>

    <div class="card" id="loginCard">
        <span class="icon">✅</span>
        <h1 id="message"></h1>
        <button class="btn" onclick="window.location.href='index.html'">Entrar novamente</button>
    </div>

    <script>
        window.onload = () => {
            const card = document.getElementById('loginCard');
            const messageElement = document.getElementById('message');
            const text = "Parabéns, você foi logado(a) com sucesso. Agora voce poderá receber todas as novidades do nosso site :)";
            
            //  Mostra o card com animação
            setTimeout(() => {
                card.classList.add('show');
            }, 100);

            let i = 0;
            function typeWriter() {
                if (i < text.length) {
                    messageElement.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typeWriter, 50);
                } else {
                    lancarConfete();
                }
            }

            setTimeout(typeWriter, 800);
        };

        function lancarConfete() {
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ffffff', '#764ba2']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ffffff', '#764ba2']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
